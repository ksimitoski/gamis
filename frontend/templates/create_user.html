{% extends "base.html" %}

{% block title %}Create User - {{ banner_text }}{% endblock %}

{% block content %}
<div class="form-card" style="max-width: 450px;">
  <h1 class="form-title" id="create-user-header">Add New User</h1>
  
  <form action="{{ url_for('create_user') }}" method="POST" id="create-user-form">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" class="form-control" placeholder="Enter username (min 3 chars)" minlength="3" required autofocus>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" class="form-control" placeholder="Enter password (min 6 chars)" minlength="6" required>
    </div>

    <div class="form-group" style="margin-top: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
      <input type="checkbox" id="is_admin" name="is_admin" style="width: 18px; height: 18px; cursor: pointer;">
      <label for="is_admin" style="margin-bottom: 0; cursor: pointer; font-weight: 500;">Give Administrator Privileges</label>
    </div>

    <div class="form-actions" style="margin-top: 2.5rem;">
      <a href="{{ url_for('index') }}" class="btn btn-secondary" id="btn-cancel">Cancel</a>
      <button type="submit" class="btn btn-primary" id="btn-submit">Register User</button>
    </div>
  </form>
</div>
{% endblock %}
