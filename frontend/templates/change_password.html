{% extends "base.html" %}

{% block title %}Change Password - gamis{% endblock %}

{% block content %}
<div class="form-card" style="max-width: 450px;">
  <h1 class="form-title" id="change-password-header">Change Password</h1>
  
  <form action="{{ url_for('change_password') }}" method="POST" id="change-password-form" onsubmit="return validatePasswords();">
    <div class="form-group">
      <label for="current_password">Current Password</label>
      <input type="password" id="current_password" name="current_password" class="form-control" placeholder="Enter current password" required autofocus>
    </div>

    <div class="form-group">
      <label for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Enter new password (min 6 chars)" minlength="6" required>
    </div>

    <div class="form-group">
      <label for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Confirm new password" minlength="6" required>
    </div>

    <div class="form-actions" style="margin-top: 2.5rem;">
      <a href="{{ url_for('index') }}" class="btn btn-secondary" id="btn-cancel">Cancel</a>
      <button type="submit" class="btn btn-primary" id="btn-submit">Update Password</button>
    </div>
  </form>
</div>

<script>
function validatePasswords() {
  const newPass = document.getElementById('new_password').value;
  const confirmPass = document.getElementById('confirm_password').value;
  if (newPass !== confirmPass) {
    alert('New passwords do not match. Please verify.');
    return false;
  }
  return true;
}
</script>
{% endblock %}
