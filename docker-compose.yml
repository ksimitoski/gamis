services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - DATABASE_DIR=/app/data
      - UPLOAD_DIR=/app/uploads
      - SECRET_KEY=${SECRET_KEY:-gamis-super-secret-key-999}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-5000}:5000"
    environment:
      - BACKEND_URL=http://backend:8000
      - SECRET_KEY=${SECRET_KEY:-gamis-super-secret-key-999}
    depends_on:
      - backend
    restart: unless-stopped
